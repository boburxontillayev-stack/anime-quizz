const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function playTone(freq, type, duration, volume = 0.1) {
    if(!audioCtx) audioCtx = new AudioContext();
    if(audioCtx.state === 'suspended') audioCtx.resume();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = type;
    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
    
    gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration);
}

function playCorrectSound() {
    playTone(523.25, 'sine', 0.2); // Do nota
    setTimeout(() => playTone(659.25, 'sine', 0.4), 100); // Mi nota
}

function playWrongSound() {
    playTone(200, 'sawtooth', 0.3, 0.05); 
    setTimeout(() => playTone(150, 'sawtooth', 0.4, 0.05), 150);
}

function playFinishSound() {
    playTone(523, 'sine', 0.2);
    setTimeout(() => playTone(659, 'sine', 0.2), 150);

let quizQuestions = [];
let currentIndex = 0;
let score = 0;

function initAndStart() {
    // Audio tizimini uyg'otish
    if(!audioCtx) audioCtx = new AudioContext();
    audioCtx.resume();

    // Fon musiqasini qo'yish
    const bg = document.getElementById("bgMusic");
    bg.volume = 0.2;
    bg.play().catch(e => console.log("Fon musiqasi kutilmoqda..."));

    startQuiz();
}

function startQuiz() {
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("quizArea").style.display = "block";
    
    quizQuestions = [];
    currentIndex = 0;
    score = 0;

    let copy = [...allQuestions];
    for(let i=0; i<10; i++) {
        let index = Math.floor(Math.random() * copy.length);
        quizQuestions.push(copy[index]);
        copy.splice(index, 1);
    }

    showQuestion();
}

function showQuestion() {
    if(currentIndex >= quizQuestions.length) {
        document.getElementById("bgMusic").pause();
        playFinishSound();
        document.getElementById("question").innerText = "Quiz tugadi!";
        document.getElementById("options").innerHTML = `<h3>Sizning natijangiz: ${score}/10</h3><button id="startBtn" onclick="location.reload()">Qaytadan boshlash</button>`;
        document.getElementById("score").innerText = "";
        return;
    }

    let q = quizQuestions[currentIndex];
    document.getElementById("question").innerText = q.text;
    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach(opt => {
        let btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt);
        optionsDiv.appendChild(btn);
    });

    document.getElementById("score").innerText = `Savol: ${currentIndex + 1}/10 | Ball: ${score}`;
}

function checkAnswer(button, selected) {
    let correct = quizQuestions[currentIndex].answer;
    let buttons = document.querySelectorAll(".option");

    buttons.forEach(b => b.disabled = true);

    if(selected === correct) {
        button.classList.add("correct");
        score++;
        playCorrectSound(); // Sintezator ovozi
    } else {
        button.classList.add("wrong");
        playWrongSound(); // Sintezator ovozi
        
        buttons.forEach(b => {
            if(b.innerText === correct) b.classList.add("correct");
        });
    }

    setTimeout(() => {
        currentIndex++;
        showQuestion();
    }, 1500);
}
